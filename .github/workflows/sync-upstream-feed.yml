name: Sync Upstream Feed

on:
  schedule:
    # Run after upstream daily digest usually finishes around 00:40 UTC.
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch upstream static files
        run: |
          set -euo pipefail
          curl -fsSL https://duanyytop.github.io/agents-radar/feed.xml -o feed.xml
          curl -fsSL https://duanyytop.github.io/agents-radar/manifest.json -o manifest.json
          curl -fsSL https://duanyytop.github.io/agents-radar/ -o index.html

      - name: Rewrite site links for this fork
        run: |
          python3 - <<'PY'
          from pathlib import Path

          upstream = "https://duanyytop.github.io/agents-radar"
          fork = "https://kevinjin1999.github.io/agents-radar"
          for name in ("feed.xml", "manifest.json", "index.html"):
              path = Path(name)
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              path.write_text(text.replace(upstream, fork), encoding="utf-8")
          PY

      - name: Commit synced feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml manifest.json index.html
          if git diff --cached --quiet; then
            echo "No upstream feed changes"
          else
            git commit -m "chore: sync upstream feed"
            git push
          fi
